name: Build comfyui-rocm Docker Image and Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h

          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache

          docker system prune -af || true

          echo "Disk after cleanup:"
          df -h

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y zstd coreutils

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile -t comfyui-rocm:latest .

      - name: Export + Compress Docker Image (stream)
        run: |
          docker save comfyui-rocm:latest | zstd -T0 -15 -o comfyui-rocm.tar.zst
          ls -lh comfyui-rocm.tar.zst

      - name: Hash compressed archive
        run: |
          sha256sum comfyui-rocm.tar.zst > comfyui-rocm.tar.zst.sha256
          md5sum comfyui-rocm.tar.zst > comfyui-rocm.tar.zst.md5

      - name: Split archive
        run: |
          split -b 1900M -d -a 3 \
            --additional-suffix=.zst \
            comfyui-rocm.tar.zst \
            comfyui-rocm.part.
          ls -lh comfyui-rocm.part.*.zst

      - name: Hash split parts
        run: |
          sha256sum comfyui-rocm.part.*.zst > comfyui-rocm.parts.sha256
          md5sum comfyui-rocm.part.*.zst > comfyui-rocm.parts.md5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: comfyui-rocm-${{ github.run_id }}
          name: comfyui-rocm ${{ github.run_id }}
          body: |
            comfyui-rocm Docker image build and export.

            Restore:

            1. Download all `comfyui-rocm.part.*.zst`
            2. Join them:
               `cat $(ls comfyui-rocm.part.*.zst | sort -V) > comfyui-rocm.tar.zst`
            3. Decompress:
               `zstd -d comfyui-rocm.tar.zst`
            4. Load image:
               `docker load -i comfyui-rocm.tar`
          files: |
            comfyui-rocm.part.*.zst
            comfyui-rocm.tar.zst.sha256
            comfyui-rocm.tar.zst.md5
            comfyui-rocm.parts.sha256
            comfyui-rocm.parts.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Release URL
        run: |
          echo "Release ready:"
          echo "https://github.com/${{ github.repository }}/releases/tag/comfyui-rocm-${{ github.run_id }}"
