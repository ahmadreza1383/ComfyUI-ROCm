name: Build comfyui-rocm Docker Image and Push to GHCR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h

          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache

          docker system prune -af || true

          echo "Disk after cleanup:"
          df -h

      - name: Set lowercase owner
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile -t comfyui-rocm:latest .

      - name: Tag image for GHCR
        run: |
          docker tag comfyui-rocm:latest ghcr.io/${{ steps.vars.outputs.owner_lc }}/comfyui-rocm:latest
          docker tag comfyui-rocm:latest ghcr.io/${{ steps.vars.outputs.owner_lc }}/comfyui-rocm:${{ github.run_id }}

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/comfyui-rocm:latest
          docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/comfyui-rocm:${{ github.run_id }}

      - name: Print image URLs
        run: |
          echo "Image pushed successfully:"
          echo "ghcr.io/${{ steps.vars.outputs.owner_lc }}/comfyui-rocm:latest"
          echo "ghcr.io/${{ steps.vars.outputs.owner_lc }}/comfyui-rocm:${{ github.run_id }}"
